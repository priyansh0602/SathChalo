name: sathchalo
description: SathChalo - Peer-to-Peer Ride Sharing App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase ─────────────────────────────────────────────
  supabase_flutter: ^2.5.9

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Maps & Location ───────────────────────────────────────
  google_maps_flutter: ^2.6.1
  geolocator: ^13.0.2
  flutter_polyline_points: ^2.0.0

  # ── Networking ────────────────────────────────────────────
  http: ^1.2.1

  # ── UI Components ─────────────────────────────────────────
  cupertino_icons: ^1.0.6
  pin_code_fields: ^8.0.1
  intl: ^0.20.2
  equatable: ^2.0.5
  timeago: ^3.6.1

  # ── Permissions & Storage ─────────────────────────────────
  permission_handler: ^12.0.1
  shared_preferences: ^2.2.3

  # ── Logger ────────────────────────────────────────────────
  logger: ^2.4.0
  app_links: ^7.0.0
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
